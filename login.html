<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Pawfetch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-page">
  <div class="auth-blob blob-a"></div>
  <div class="auth-blob blob-b"></div>

  <div class="auth-card" data-animate="fade-up">

    <div class="auth-media">
      <img src="https://images.unsplash.com/photo-1601758228041-f3b2795255f1?q=80&w=900&auto=format&fit=crop" alt="Happy puppy welcoming you back">
      <div class="auth-media-overlay">
        <a href="index.html" class="brand light">
          <span class="brand-icon"><i class="fa-solid fa-paw"></i></span>
          <span class="brand-name">Stackly</span>
        </a>
        <h2>Welcome back to the pack.</h2>
        <p>Log in to manage orders, bookings and your pet's care — all from one place.</p>
        <div class="auth-stats">
          <div class="stat"><strong>12k+</strong><span>Happy Pets</span></div>
          <div class="stat"><strong>4.9<i class="fa-solid fa-star"></i></strong><span>Rating</span></div>
        </div>
      </div>
    </div>

    <div class="auth-form-side">
      <span class="eyebrow"><i class="fa-solid fa-lock"></i> Secure Login</span>
      <h1>Log in to your account</h1>
      <p class="auth-sub">New here? <a href="signup.html">Create an account</a></p>

      <form id="login-form" class="auth-form">

        <div class="role-toggle">
          <button type="button" class="role-btn active" data-role="user">
            <i class="fa-solid fa-user"></i> User
          </button>
          <button type="button" class="role-btn" data-role="admin">
            <i class="fa-solid fa-user-shield"></i> Admin
          </button>
        </div>
        <input type="hidden" id="selected-role" value="user">

        <div class="form-field light">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="login-email" placeholder="Email address" required>
        </div>

        <div class="form-field light">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="button" class="toggle-pass" aria-label="Toggle password visibility">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>

        <div class="auth-row">
          <label class="checkbox-row">
            <input type="checkbox" id="remember-me">
            <span class="custom-check"><i class="fa-solid fa-check"></i></span>
            Remember me
          </label>
          <a href="404.html?from=login" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary auth-submit">
          <i class="fa-solid fa-right-to-bracket"></i> Log In
        </button>

        <p class="auth-note" id="login-note"></p>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-auth">
          <button type="button" class="social-auth-btn" data-from="login"><i class="fa-brands fa-google"></i> Google</button>
          <button type="button" class="social-auth-btn" data-from="login"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
