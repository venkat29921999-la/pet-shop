<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Pawfetch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="error-body">

<div class="error-page">
  <div class="auth-blob blob-a"></div>
  <div class="auth-blob blob-b"></div>

  <a href="index.html" class="brand error-brand" data-animate="fade-up">
    <span class="brand-icon"><i class="fa-solid fa-paw"></i></span>
    <span class="brand-name">Pawfetch</span>
  </a>

  <div class="error-content">

    <div class="error-media" data-animate="fade-in">
      <div class="error-number">
        <span>4</span>
        <span class="paw-zero">
          <i class="fa-solid fa-paw"></i>
        </span>
        <span>4</span>
      </div>
      <img class="error-dog" src="Assest/shop9.webp" alt="Confused puppy looking for the page">

      <div class="error-bone bone-1"><i class="fa-solid fa-bone"></i></div>
      <div class="error-bone bone-2"><i class="fa-solid fa-bone"></i></div>
      <div class="error-paw-print print-1"><i class="fa-solid fa-paw"></i></div>
      <div class="error-paw-print print-2"><i class="fa-solid fa-paw"></i></div>
      <div class="error-paw-print print-3"><i class="fa-solid fa-paw"></i></div>
    </div>

    <div class="error-copy" data-animate="fade-up">
      <span class="eyebrow"><i class="fa-solid fa-magnifying-glass"></i> Lost Trail</span>
      <h1 id="error-heading">Looks like this page ran off chasing something.</h1>
      <p id="error-message">The page you're looking for doesn't exist, moved, or got buried in the backyard. Let's get you back on track.</p>

      <!-- This single button changes its destination depending on where the user came from -->
      <div class="error-actions" id="error-actions">
<a href="javascript:void(0)" class="btn btn-primary" id="error-back-btn">
            <i class="fa-solid fa-house" id="error-back-icon"></i>
          <span id="error-back-label">Back to Home</span>
        </a>
      </div>
    </div>
  </div>
</div>

<script src="404.js"></script>
</body>
</html>
