<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Pawfetch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-page">
  <div class="auth-blob blob-a"></div>
  <div class="auth-blob blob-b"></div>

  <div class="auth-card reverse" data-animate="fade-up">

    <div class="auth-form-side">
      <span class="eyebrow"><i class="fa-solid fa-paw"></i> Join the Pack</span>
      <h1>Create your account</h1>
      <p class="auth-sub">Already a member? <a href="login.html">Log in</a></p>

      <form id="signup-form" class="auth-form">

        <div class="role-toggle">
          <button type="button" class="role-btn active" data-role="user">
            <i class="fa-solid fa-user"></i> I'm a User
          </button>
          <button type="button" class="role-btn" data-role="admin">
            <i class="fa-solid fa-user-shield"></i> I'm an Admin
          </button>
        </div>
        <input type="hidden" id="signup-role" value="user">

        <div class="form-field light">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="signup-name" placeholder="Full Name" required>
        </div>

        <div class="form-field light">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="signup-email" placeholder="Email address" required>
        </div>

        <div class="form-field light">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" id="signup-phone" placeholder="Phone Number" required>
        </div>

        <div class="form-field light">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="signup-password" placeholder="Password" required minlength="6">
          <button type="button" class="toggle-pass" aria-label="Toggle password visibility">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>

        <div class="password-strength" id="pass-strength">
          <span></span><span></span><span></span>
        </div>

        <div class="form-field light">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="signup-confirm" placeholder="Confirm Password" required minlength="6">
        </div>

        <label class="checkbox-row terms-row">
          <input type="checkbox" id="agree-terms" required>
          <span class="custom-check"><i class="fa-solid fa-check"></i></span>
          I agree to the Terms &amp; Privacy Policy</a>
        </label>

        <button type="submit" class="btn btn-primary auth-submit">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>

        <p class="auth-note" id="signup-note"></p>

        <div class="divider"><span>or sign up with</span></div>

        <div class="social-auth">
          <button type="button" class="social-auth-btn" data-from="signup"><i class="fa-brands fa-google"></i> Google</button>
          <button type="button" class="social-auth-btn" data-from="signup"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
        </div>
      </form>
    </div>

    <div class="auth-media">
      <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=900&auto=format&fit=crop" alt="Puppy excited to join Pawfetch">
      <div class="auth-media-overlay">
        <a href="index.html" class="brand light">
          <span class="brand-icon"><i class="fa-solid fa-paw"></i></span>
          <span class="brand-name">Stackly</span>
        </a>
        <h2>Start your pet's care journey.</h2>
        <p>Create an account to book services, track orders, and unlock membership perks.</p>
        <ul class="auth-perks">
          <li><i class="fa-solid fa-check"></i> Member-only discounts</li>
          <li><i class="fa-solid fa-check"></i> Easy service booking</li>
          <li><i class="fa-solid fa-check"></i> Order tracking dashboard</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
